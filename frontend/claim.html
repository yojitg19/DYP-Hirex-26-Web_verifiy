<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Claim - VerifyID</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="dashboard.html" class="logo">VerifyID</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>

    <div class="container-sm">
        <div class="page-header">
            <h1>Submit a professional claim</h1>
        </div>

        <div id="alert-box" class="alert"></div>

        <div id="claim-form-section">
            <div class="card">
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="role-input" placeholder="e.g. Software Engineer, CEO" required>
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="company-input" placeholder="e.g. Google, TCS" required>
                </div>
                <div id="risk-badge" style="display:none"></div>
                <button class="btn btn-primary" id="claim-btn" onclick="submitClaim()">Submit Claim</button>
            </div>
        </div>

        <div id="next-steps-section" style="display:none">
            <div class="card">
                <p id="next-step-msg"></p>

                <div id="otp-section" style="display:none">
                    <div class="form-group" style="margin-top:16px">
                        <label>OTP</label>
                        <input type="text" id="otp-input" maxlength="6" placeholder="Enter 6-digit OTP" required>
                    </div>
                    <button class="btn btn-primary" id="otp-btn" onclick="submitOtp()">Verify OTP</button>
                </div>

                <div id="doc-section" style="display:none">
                    <div class="form-group" style="margin-top:16px">
                        <label>Supporting Document</label>
                        <input type="file" id="doc-input" accept=".pdf,.jpg,.png,.jpeg" required>
                    </div>
                    <button class="btn btn-primary" id="doc-btn" onclick="uploadDocument()">Upload Document</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/device.js"></script>
    <script src="js/claim.js"></script>
</body>
</html>
