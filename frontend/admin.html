<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - VerifyID</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="admin.html" class="logo">VerifyID Admin</a>
            <button class="btn btn-outline btn-sm" onclick="loadPendingClaims()" style="margin-left:auto">Refresh</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Admin review dashboard</h1>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="value" id="total-pending">0</div>
                <div class="label">Pending reviews</div>
            </div>
            <div class="summary-card">
                <div class="value" id="high-risk-count">0</div>
                <div class="label">High risk</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Pending claims</div>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Company</th>
                        <th>Risk</th>
                        <th>Trust score</th>
                        <th>Checks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-tbody">
                    <tr><td colspan="7" class="text-center text-muted" style="padding:24px">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="reject-modal" class="modal-overlay">
        <div class="modal">
            <h3>Reject claim</h3>
            <input type="hidden" id="reject-claim-id">
            <div class="form-group">
                <label>Reason for rejection</label>
                <input type="text" id="reject-reason" placeholder="Enter reason">
            </div>
            <div class="flex gap-2 mt-2">
                <button class="btn btn-danger" onclick="confirmReject()" style="flex:1">Confirm Reject</button>
                <button class="btn btn-outline" onclick="closeRejectModal()" style="flex:1">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
